<style>

.progress-wrap{height:8px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;}

STEP 10 — ADD helper function fmtDate() if it doesn't exist
Find formatDate() in your app — if it's called formatDate not fmtDate,
add this alias anywhere in your script:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function fmtDate(d){
  if(!d)return '—';
  return new Date(d).toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'});
}

function esc(str){
  if(!str)return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
